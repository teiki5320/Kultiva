name: kultiva
description: "Kultiva — Calendrier de semis pour jardiniers (Flutter)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # UI
  google_fonts: ^6.1.0

  # Auth & Backend
  supabase_flutter: ^2.0.0
  google_sign_in: ^6.1.6
  sign_in_with_apple: ^5.0.0

  # Préférences locales
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^12.0.0

  # Notifications
  flutter_local_notifications: ^16.1.0

  # URL launcher (liens Amazon)
  url_launcher: ^6.2.2

  # Export PDF
  pdf: ^3.10.0
  printing: ^5.12.0

  # Géolocalisation
  geolocator: ^11.0.0

  # HTTP (météo Open-Meteo)
  http: ^1.2.0

  # Audio (sons + musique de fond)
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
