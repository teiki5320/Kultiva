name: kultiva
description: "Kultiva — Calendrier de semis pour jardiniers (Flutter)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # UI
  google_fonts: ^6.1.0

  # Auth & Backend
  supabase_flutter: ^2.0.0
  google_sign_in: ^6.1.6
  sign_in_with_apple: ^5.0.0

  # Préférences locales
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^12.0.0

  # Notifications
  flutter_local_notifications: ^16.1.0

  # URL launcher (liens Amazon)
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Pour activer les illustrations saisonnières :
  # 1. Ajoute spring.png / summer.png / autumn.png / winter.png
  #    dans assets/images/
  # 2. Décommente les lignes ci-dessous
  # assets:
  #   - assets/images/
