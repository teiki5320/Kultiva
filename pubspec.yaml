name: kultiva
description: "Kultiva — Calendrier de semis pour jardiniers (Flutter)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # UI
  google_fonts: ^6.1.0

  # Préférences locales
  shared_preferences: ^2.2.2

  # Backend : auth + sync cloud du Poussidex
  supabase_flutter: ^2.5.0

  # Navigation
  go_router: ^12.0.0

  # Notifications (planification mensuelle + alertes météo)
  # TODO: flutter_local_notifications 16 → 21 dispo mais breaking API.
  # Tant qu'on est sur 16.x, timezone est bloqué sur 0.9.x.
  flutter_local_notifications: ^16.1.0
  timezone: ^0.9.4

  # URL launcher (liens Amazon)
  url_launcher: ^6.2.2

  # Export PDF
  pdf: ^3.10.0
  printing: ^5.12.0

  # Géolocalisation
  geolocator: ^11.0.0

  # HTTP (météo Open-Meteo)
  http: ^1.2.0

  # Audio (sons + musique de fond)
  audioplayers: ^6.1.0

  # Photos des plants du Poussidex
  image_picker: ^1.0.4
  path_provider: ^2.1.1

  # Partage d'images (cartes Poussidex sur Instagram / Stories)
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Génération des icônes iOS + Android à partir de assets/images/app_icon.png
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/

# ─── Packages intentionnellement non-majorés (breaking API) ───
#
# Les majeures suivantes sont disponibles mais demandent une
# migration non-triviale. À reprendre quand on a du temps :
#   flutter_local_notifications 16 → 21 (schéma channels / perms)
#   geolocator 11 → 14               (API position async)
#   go_router 12 → 17                (plusieurs breaks typed routes)
#   share_plus 7 → 13                (API Share change)
#   google_fonts 6 → 8               (à vérifier)
#   printing 5 → dernière            (Dart 3+ stricter)
# Vérifier en lançant `flutter pub outdated --show-all`.

flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#FCF4E1"
  min_sdk_android: 21
  # Icône adaptative Android (API 26+) : fond crème + lettre en premier plan.
  adaptive_icon_background: "#FCF4E1"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
